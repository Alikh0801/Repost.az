# Render Blueprint — GitHub repo kökündən
services:
  - type: web
    name: repost-api
    runtime: node
    plan: free
    rootDir: repost/server
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_VERSION
        value: "22.14.0"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        value: https://repost-az.vercel.app,https://repost-az-admin.vercel.app,http://localhost:5173,http://localhost:5174
      - key: PUBLIC_BASE_URL
        value: https://repost-api-cv3y.onrender.com
      - key: SITE_URL
        value: https://repost-az.vercel.app
      - key: VIEW_BOOST_ENABLED
        value: true
      - key: VIEW_BOOST_WINDOW_HOURS
        value: "6"
      - key: VIEW_BOOST_MIN
        value: "20"
      - key: VIEW_BOOST_MAX
        value: "40"
      - key: VIEW_BOOST_INTERVAL_MS
        value: "300000"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: repost
