# Render Blueprint — Root Directory bu faylla eyni qovluqda olmalıdır: repost/server
services:
  - type: web
    name: repost-api
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        value: https://repost-az.vercel.app,http://localhost:5173,http://localhost:5174
      - key: PUBLIC_BASE_URL
        sync: false
      - key: SITE_URL
        value: https://repost-az.vercel.app
      - key: VIEW_BOOST_ENABLED
        value: true
